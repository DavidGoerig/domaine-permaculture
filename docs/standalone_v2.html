
<style>
*{box-sizing:border-box;margin:0;padding:0;}
#app{display:flex;flex-direction:column;min-height:700px;}
#header{padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
#header h1{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1;}
#week-ctrl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary);}
#week-slider{width:110px;}
#week-label{font-weight:500;color:var(--color-text-primary);min-width:74px;}
#main{display:flex;flex:1;overflow:hidden;}
#map-area{flex:1;overflow:auto;background:var(--color-background-secondary);padding:4px;}
#side-panel{width:215px;min-width:190px;border-left:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);display:flex;flex-direction:column;overflow:hidden;}
#panel-header{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);}
#panel-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
#panel-meta{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
#panel-body{padding:10px 12px;flex:1;overflow-y:auto;}
.ps{margin-bottom:11px;}
.ps h3{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.ps p,.ps li{font-size:11px;color:var(--color-text-primary);line-height:1.5;}
.ps ul{list-style:none;padding:0;}
.ps li::before{content:"·";margin-right:4px;color:var(--color-text-tertiary);}
.ti{font-size:11px;padding:3px 6px;border-radius:4px;margin-bottom:2px;background:var(--color-background-secondary);color:var(--color-text-primary);}
.ti.high{border-left:2px solid #E8593C;}
.ti.med{border-left:2px solid #EF9F27;}
.ti.low{border-left:2px solid #3B8BD4;}
.out-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin:2px 2px 0 0;background:var(--color-background-info);color:var(--color-text-info);}
#filters{padding:7px 10px;border-top:0.5px solid var(--color-border-tertiary);}
#filters label{font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px;cursor:pointer;margin-bottom:2px;}
#filters input{accent-color:var(--color-text-info);}
.zg{cursor:pointer;}
.zg rect,.zg polygon{transition:opacity .15s;}
.zg:hover rect,.zg:hover polygon{opacity:.75;}
.zr.sel{stroke-width:2.5!important;}
.zl{pointer-events:none;font-family:var(--font-sans);}
.fl{fill:none;stroke-width:1.5;opacity:.75;transition:opacity .3s;}
.fl.hid{opacity:0!important;pointer-events:none;}
.hint{font-size:11px;color:var(--color-text-tertiary);text-align:center;padding:20px 10px;line-height:1.6;}
</style>

const TC={habitat:"#a89070",eau:"#3B8BD4",maraîchage:"#3aaa5a",verger:"#7aaa3a",animaux:"#cc9a3a",stockage:"#6a90b0",transformation:"#cc8f3a",champignons:"#7a5a9a"};
const TL={habitat:"Habitat",eau:"Eau",maraîchage:"Maraîchage",verger:"Verger/Extensif",animaux:"Animaux",stockage:"Stockage",transformation:"Transformation",champignons:"Champignons"};

function wr(w){
  if(w<=8)return"1-8";if(w<=16)return"9-16";if(w<=24)return"17-24";if(w<=32)return"25-32";if(w<=40)return"33-40";if(w<=48)return"41-48";return"49-56";
}

let selZ=null,curW=22;

function sel(id){
  if(selZ){const p=document.getElementById("r_"+selZ);if(p)p.classList.remove("sel");}
  selZ=id;
  const r=document.getElementById("r_"+id);if(r)r.classList.add("sel");
  rp(id,curW);
}

function rp(id,w){
  const z=Z[id];if(!z)return;
  document.getElementById("panel-title").textContent=z.name;
  const c=TC[z.type]||"#888";
  document.getElementById("panel-meta").innerHTML=
    `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${c};margin-right:4px;vertical-align:middle;"></span>${TL[z.type]||z.type}${z.surface?' · '+z.surface.toLocaleString('fr')+' m²':''}`;
  const rng=wr(w);
  let tasks=(z.tasks[rng]||z.tasks["1-56"]||[]);
  let h="";
  if(z.desc)h+=`<div class="ps"><p>${z.desc}</p></div>`;
  if(z.outputs&&z.outputs.length){
    h+=`<div class="ps"><h3>Productions / Outputs</h3>`;
    z.outputs.forEach(o=>h+=`<span class="out-badge">${o}</span>`);
    h+=`</div>`;
  }
  if(z.plants&&z.plants.length)h+=`<div class="ps"><h3>Plantes / Cultures</h3><ul>${z.plants.map(p=>`<li>${p}</li>`).join("")}</ul></div>`;
  if(z.animals&&z.animals.length)h+=`<div class="ps"><h3>Animaux</h3><ul>${z.animals.map(a=>`<li>${a}</li>`).join("")}</ul></div>`;
  if(z.inputs&&z.inputs.length)h+=`<div class="ps"><h3>Inputs</h3><ul>${z.inputs.map(i=>`<li>${i}</li>`).join("")}</ul></div>`;
  if(z.tools&&z.tools.length)h+=`<div class="ps"><h3>Outils / Équipements</h3><ul>${z.tools.map(t=>`<li>${t}</li>`).join("")}</ul></div>`;
  if(tasks.length){
    h+=`<div class="ps"><h3>Tâches — Sem. ${w}</h3>`;
    tasks.forEach(t=>{const c=t.p==="high"?"high":t.p==="med"?"med":"low";h+=`<div class="ti ${c}">${t.t}</div>`;});
    h+=`</div>`;
  } else {
    h+=`<div class="ps"><h3>Tâches — Sem. ${w}</h3><p style="color:var(--color-text-tertiary);font-size:11px;">Pas de tâche spécifique cette semaine.</p></div>`;
  }
  document.getElementById("panel-body").innerHTML=h;
}

document.getElementById("wsl").addEventListener("input",function(){
  curW=parseInt(this.value);
  document.getElementById("wlb").textContent="Semaine "+curW;
  if(selZ)rp(selZ,curW);
});

function uf(){
  const fW=document.getElementById("fW").checked;
  const fF=document.getElementById("fF").checked;
  const fH=document.getElementById("fH").checked;
  const fA=document.getElementById("fA").checked;
  const fT=document.getElementById("fT").checked;
  ["fw1","fw2","fw3"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("hid",!fW);});
  ["ff1","ff2","ff3","ff4"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("hid",!fF);});
  ["fh1","fh2","fh3","fh4"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("hid",!fH);});
  ["fa1","fa2","fa3","fa4"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("hid",!fA);});
  ["ft1"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle("hid",!fT);});
}
</script>
