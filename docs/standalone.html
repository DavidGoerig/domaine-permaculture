<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domaine Permaculture — Earthship + Systèmes autonomes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f3ee;color:#222}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{padding:10px 16px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
#hdr h1{font-size:15px;font-weight:600;flex:1}
#wc{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
#wsl{width:120px}
#wlb{font-weight:600;color:#222;min-width:80px}
#main{display:flex;flex:1;overflow:hidden}
#map{flex:1;overflow:auto;background:#f0ece4;padding:6px}
#sp{width:230px;min-width:200px;border-left:1px solid #ddd;background:#fff;display:flex;flex-direction:column;overflow:hidden}
#ph{padding:10px 13px;border-bottom:1px solid #eee}
#pt{font-size:13px;font-weight:600;color:#222}
#pm{font-size:11px;color:#888;margin-top:2px}
#pb{padding:10px 13px;flex:1;overflow-y:auto;font-size:11px;line-height:1.55;color:#333}
.ps{margin-bottom:12px}
.ps h3{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ps ul{list-style:none;padding:0}
.ps li::before{content:"·";margin-right:4px;color:#bbb}
.ti{font-size:11px;padding:3px 7px;border-radius:4px;margin-bottom:3px;background:#f5f3ee}
.ti.h{border-left:2px solid #E8593C}
.ti.m{border-left:2px solid #EF9F27}
.ti.l{border-left:2px solid #3B8BD4}
.ob{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;margin:2px 2px 0 0;background:#ddeeff;color:#1155aa}
.eb{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;margin:2px 2px 0 0;background:#fff0d0;color:#aa7700}
#flt{padding:8px 12px;border-top:1px solid #eee}
#flt .ftitle{font-size:10px;font-weight:600;color:#888;margin-bottom:5px}
#flt label{font-size:11px;color:#555;display:flex;align-items:center;gap:5px;cursor:pointer;margin-bottom:3px}
.zg{cursor:pointer}
.zg:hover rect{opacity:.75}
.zr{transition:opacity .15s;stroke-width:1}
.zr.sel{stroke-width:2.5!important}
.zl{pointer-events:none;font-family:system-ui,-apple-system,sans-serif}
.fl{fill:none;stroke-width:1.5;opacity:.85;transition:opacity .3s}
.fl.hid{opacity:0!important;pointer-events:none}
.hint{font-size:12px;color:#aaa;text-align:center;padding:24px 12px;line-height:1.6}
</style>
</head>
